<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Victoria Mehera</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b1220;
      font-family: Arial, sans-serif;
      color: white;
    }

    .card {
      text-align: center;
      padding: 40px 24px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      width: min(90%, 700px);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 56px;
      font-weight: 700;
    }

    .email {
      font-size: 28px;
      color: #dbeafe;
    }

    .email a {
      color: inherit;
      text-decoration: none;
    }

    .email a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Victoria Mehera</h1>
    <div class="email">
      <a href="mailto:meheravictoria@gmail.com">meheravictoria@gmail.com</a>
    </div>
  </div>
</body>
</html>
